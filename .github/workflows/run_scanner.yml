name: Live Stock Scanner 24/7 Engine

on:
  schedule:
    # Runs every Monday through Friday at 09:30 AM UTC
    - cron: '30 9 * * 1-5'
  workflow_dispatch: # Allows you to manually trigger it with a button anytime

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Trading Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install yfinance pandas requests plyer; fi

    - name: Execute Live Stock Scan
      run: python main.py