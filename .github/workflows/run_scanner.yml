name: Live Stock Scanner 24/7 Engine

on:
  schedule:
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    # Gives the cloud node permission to write/save files back into your repository folder
    permissions:
      contents: write

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Trading Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install yfinance pandas requests plyer; fi

    - name: Execute Live Stock Scan
      run: python main.py

    - name: Save and Commit Generated Reports
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions Bot"
        git add Data/*.txt Data/*.csv || true
        git commit -m "Auto-logged latest market scan reports [Skip CI]" -a || echo "No new report modifications found."
        git push origin main || echo "No changes to sync."